body:
  text: 大廣智不空譯南無歸命頂禮南方海上蒲陀落淨土正法教主釋迦牟尼如來觀音本師無量壽如來觀音本正法明如來南無千手千眼觀世音菩薩廣大圓滿無礙大悲心大陀羅尼救苦陀羅尼延壽陀羅尼加滅惡趣陀羅尼破業障陀羅尼滿願陀羅尼隨心自在陀羅尼速超上地陀羅尼一聞神呪超第八地陀羅尼四百四病一時消滅陀羅尼南無喝羅􅑈怛那哆羅夜㖿一此觀世音菩薩本身大須慈悲思勿高聲此神性忽南無阿􅝪唎㖿二是如意輪菩薩本身到此誦在心婆盧羯帝爍鉢囉㖿三此是轉鉢觀音昔誦此理轉菩薩菩提薩哆婆㖿四此不空羂索菩薩降押天兵眾摩訶薩埵婆㖿五是菩薩種子之因誦呪本身摩訶迦嚧昵迦㖿六是馬鳴菩薩本身手把拔折羅印菩薩自身唵七此是神唵語悉合掌聽誦呪曰薩􅞣皤囉罰曳八此是四天大王本身降伏魔王數怛那怛寫九此是四天大王八部鬼神名字南無悉吉㗚埵伊蒙阿唎耶十此是龍樹菩薩本身須用心誦勿令疎步菩薩性勿也婆嚧吉帝室佛楞馱婆十一此是本師毘盧遮那佛本身廣大圓滿不可思議功德南無那囉謹墀十二此是清淨圓滿報身盧舍那佛本身須用心勿令放逸醯利摩皤哆沙咩十三此是半頭神王菊大魔以為眷屬薩􅞣婆阿陀頭輸朋十四此是甘露菩薩亦是觀世音菩薩部落以為眷屬阿遊孕十五此是飛騰夜叉大王巡歷四方察其是非薩􅞣婆菩哆那摩縛伽十六此是婆帝王其形黑大大以豹皮為衣神手把衣叉摩罰特豆十七此是剎利菩薩本身鐵輪手把夜叉素有三眼是也怛姪他十八唵此是劍語阿波盧醯盧迦帝十九此是梵天王本身說佛為部迦羅帝二十此是立門五神長大黑色夷醯唎二十一此是三十三天王是摩醯首羅天王神領天兵摩訶菩薩埵二十二此是寶心更無雜亂心節名薩埵薩􅞣婆􅞣薩婆二十三此是香積菩薩押五方兵薩婆為侍從不可思議摩羅摩羅摩摩醯唎馱孕二十四同上俱嚧俱嚧羯􅝧蒙二十五此是空身菩薩押夫將軍領二萬億天兵忽度嚧度嚧罰闍耶帝二十六此是嚴峻菩薩孔雀王兵摩訶罰闍耶帝二十七同上陀羅陀羅二十八此是觀世音菩薩大手把金輪地利尼二十九此是師子王兵驗不調囉耶三十是霹靂降伏魔眷屬遮囉遮囉三十一此是摧碎菩薩本身手把金輪摩摩弟子某甲受持罰摩羅三十二此是大降魔金剛本身手把金輪穆帝曬三十三此是佛合掌聽誦千手千眼觀世音菩薩善神妙章句伊醯移醯三十四此是喚摩醯首羅天室那室那三十五同上阿􅟅羅參佛羅舍利三十六此是觀世音菩薩手把軍弓箭罰沙罰參佛羅舍耶三十七此是阿彌陀佛本身觀音菩薩師主呼嚧呼嚧麼囉三十八此是呼八部鬼神呼嚧呼嚧醯唎三十九同上沙囉沙囉四十此是五濁惡世云悉唎悉唎四十一蘇嚧蘇嚧四十二此是諸佛樹樂木聲也菩提㖿菩提㖿四十三此是觀世音豫眾生罪惡菩提耶菩提耶四十四此是阿難本身也彌帝唎耶四十五此是本車菩薩手把金刀那囉謹墀四十六此是龍樹菩薩手把金刀之長他􅞽唎瑟尼那波夜摩那四十七此是金光幢菩薩手把跋折羅杵􅁥娑婆訶四十八同上悉陀夜四十九此是達一切法門􅁥娑婆訶五十法語摩訶悉陀夜􅁥娑婆訶此是施光幢菩薩手把幡悉陀喻藝五十二此是天大菩薩悉手來把刀或菩薩手把水椀室皤伽羅耶􅁥娑婆訶五十三此是名安悉香那囉謹墀五十五同上􅁥娑婆訶五十六摩囉那囉五十七此是散水菩薩手把水椀􅁥娑婆訶五十八同上悉囉僧阿穆佉耶五十九此是山海惠菩薩手把金鉤􅁥娑婆訶六十同上婆摩訶悉陀夜六十一同上􅁥娑婆訶六十二同上者吉囉阿悉陀夜六十三此是藥王菩薩本身行魔􅁥娑婆訶六十四同上婆摩羯悉哆夜六十五是藥上菩薩本身行魔痛􅁥娑婆訶六十六同上那羅謹墀皤迦羅夜六十七同上􅁥娑婆訶六十八同上摩婆唎勝羯夜六十九同上􅁥娑婆訶七十南無喝囉􅑈怛那多囉夜耶七十一南無阿􅝪唎耶七十二婆嚧吉帝七十三爍皤囉耶七十四菩提􅁥娑婆呵青頸大悲心印虛心合掌屈二頭指各拘二大指第二節是法螺也二中指竪合是蓮花也二無名指竪圓端是輪也二小指直竪合是杖也於一印具四印謂法螺蓮華輪杖也
